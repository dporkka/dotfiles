# starship.toml — fast, informative prompt for terminal-first dev
# Design: show only what matters, nothing decorative
# Performance: starship is a compiled binary; startup cost is ~2ms

format = """
$directory\
$git_branch\
$git_status\
$nodejs\
$python\
$cmd_duration\
$line_break\
$character"""

right_format = """
$jobs\
$status"""

# Reduce latency — starship will abort checks that take too long
command_timeout = 1000  # ms

[character]
success_symbol = "[❯](bold green)"
error_symbol = "[❯](bold red)"
vimcmd_symbol = "[❮](bold green)"

[directory]
style = "bold blue"
truncation_length = 4
truncate_to_repo = true
read_only = " 󰌾"
format = "[$path]($style)[$read_only]($read_only_style) "

[git_branch]
symbol = " "
format = "[$symbol$branch(:$remote_branch)]($style) "
style = "bold purple"
truncation_length = 25

[git_status]
format = '([\[$all_status$ahead_behind\]]($style) )'
style = "bold yellow"
ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
conflicted = "≠${count}"
modified = "!${count}"
staged = "+${count}"
untracked = "?${count}"
deleted = "✘${count}"

[nodejs]
format = "[$symbol($version )]($style)"
symbol = " "
style = "bold green"
# Only show when in a node project — don't show in every directory
detect_files = ["package.json", ".nvmrc", ".node-version"]
detect_folders = ["node_modules"]
# Don't show version — too noisy in monorepos
version_format = ""

[python]
format = "[$symbol$pyenv_prefix($version)($virtualenv )]($style)"
symbol = " "
style = "bold yellow"
detect_extensions = ["py"]
version_format = "${raw}"
pyenv_version_name = true

[cmd_duration]
min_time = 2000  # only show for commands taking >2 seconds
format = "[ $duration]($style) "
style = "bold yellow"
show_milliseconds = false

[jobs]
symbol = " "
format = "[$symbol$number]($style) "
style = "bold blue"
number_threshold = 1
symbol_threshold = 1

[status]
disabled = false
format = "[$status]($style) "
style = "bold red"

# Disable modules we don't use (speeds up prompt)
[aws]
disabled = true

[gcloud]
disabled = true

[azure]
disabled = true

[docker_context]
disabled = true

[kubernetes]
disabled = true

[terraform]
disabled = true

[package]
disabled = true  # slow in large monorepos; use package-info.nvim instead

[time]
disabled = true  # shown in tmux status bar

[username]
disabled = true  # irrelevant in personal WSL

[hostname]
disabled = true  # shown in tmux status bar when SSHed
ssh_only = false  # but re-enable when you want it:
# disabled = false
# ssh_only = true
