# =============================================================================
# tmux.conf — production config for AI-native multi-repo development
# =============================================================================

# ---------------------------------------------------------------------------
# PREFIX — C-a is ergonomic and doesn't conflict with shell readline
# ---------------------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix  # C-a C-a sends literal C-a to the shell

# ---------------------------------------------------------------------------
# TERMINAL & COLORS
# ---------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
set -sa terminal-features ",xterm-256color:RGB"
# WHY: enables true color (24-bit) inside tmux. Without this, Neovim
# colorschemes look wrong (degraded to 256 colors).

set -g default-shell /bin/zsh

# ---------------------------------------------------------------------------
# BEHAVIOR
# ---------------------------------------------------------------------------

set -g mouse on               # mouse support: click pane, scroll, resize
set -g history-limit 100000   # large scrollback for logs/test output
set -g base-index 1           # windows start at 1 (not 0) — easier to reach
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # renumber windows when one is closed
set -g set-clipboard on       # sync clipboard with OS
set -g focus-events on        # pass focus events to apps (helps Neovim autoread)
set -g automatic-rename off   # don't rename windows automatically
set -g allow-rename off
set -sg escape-time 0         # zero escape delay — CRITICAL for Neovim responsiveness
                               # Without this, <Esc> in Neovim has a 500ms delay.
set -g repeat-time 600        # ms to repeat a bound key without re-pressing prefix

# Bell-based "agent finished" alerts (scripts/notify.sh rings the bell on exit)
set -g monitor-bell on        # flag a window when its process rings the bell
set -g visual-bell off        # no screen flash; just the status-bar flag
set -g bell-action other      # alert on bells from windows other than the focused one
setw -g window-status-bell-style "fg=#1a1b26,bg=#e0af68,bold"

# ---------------------------------------------------------------------------
# VI MODE — consistent with Neovim muscle memory
# ---------------------------------------------------------------------------

setw -g mode-keys vi

bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel

# ---------------------------------------------------------------------------
# RELOAD
# ---------------------------------------------------------------------------

bind r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ---------------------------------------------------------------------------
# PANE SPLITTING — open in current directory
# ---------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}" -l 10  # small horizontal split for quick commands
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# PANE NAVIGATION — vim-style + Ctrl variants for speed
# ---------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching: if Neovim is running, pass Ctrl+hjkl to it
# Requires the vim-tmux-navigator plugin in Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ---------------------------------------------------------------------------
# PANE RESIZING
# ---------------------------------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z  # zoom/unzoom pane (maximize)
bind z resize-pane -Z     # standard tmux zoom key

# ---------------------------------------------------------------------------
# WINDOW MANAGEMENT
# ---------------------------------------------------------------------------

bind c new-window -c "#{pane_current_path}"  # new window in current dir
bind C command-prompt -p "window name:" "new-window -c '#{pane_current_path}' -n '%%'"
bind w choose-window                          # window picker
bind , command-prompt -I "#{window_name}" -p "window name:" "rename-window '%%'"
bind b break-pane                             # move current pane into its own window

# Quick window switching without prefix (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Move windows left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind -n M-Left previous-window
bind -n M-Right next-window

# ---------------------------------------------------------------------------
# SESSION MANAGEMENT
# ---------------------------------------------------------------------------

bind s choose-tree -Zs          # session switcher with preview
bind S choose-tree -Zw          # window switcher across sessions
bind n new-session              # new session prompt
bind $ command-prompt -I "#{session_name}" -p "session name:" "rename-session '%%'"
bind X confirm-before kill-session
bind Tab last-window            # quick toggle to previous window

# Mouse shortcuts on the status bar
bind-key -n MouseDown1StatusLeft choose-tree -Zs
bind-key -n MouseDown1StatusRight choose-tree -Zw

# Quick new session from current directory
bind N new-session -c "#{pane_current_path}" -s "#{b:pane_current_path}"
bind f display-popup -E -w 90% -h 80% 'selected=$(find "$HOME/dev" "$HOME/workspace" "$HOME/hermes-workspace" -mindepth 1 -maxdepth 3 -type d -name .git 2>/dev/null | sed "s#/.git$##" | sort | fzf --prompt="project> "); [ -n "$selected" ] && tmux new-session -A -s "$(basename "$selected" | tr " ." "__")" -c "$selected"'

# ---------------------------------------------------------------------------
# PRODUCTIVITY POPUPS & MODES
# ---------------------------------------------------------------------------

bind t display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "zsh -i"
bind g display-popup -E -w 95% -h 90% -d "#{pane_current_path}" "if command -v lazygit >/dev/null 2>&1; then lazygit; else git status; zsh -i; fi"
bind e setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"
bind Space next-layout
bind / copy-mode \; command-prompt -p "search scrollback:" "send-keys -X search-backward '%%'"
bind P command-prompt -I "$HOME/tmux-pane.log" -p "capture file:" "capture-pane -S - \; save-buffer '%%' \; delete-buffer \; display-message 'saved pane to %%'"
bind ? display-popup -E -w 80% -h 80% "tmux list-keys | less"

# ---------------------------------------------------------------------------
# LAYOUTS — for AI agent workflows
# ---------------------------------------------------------------------------

# Dev layout: editor (left, 70%) + terminal (right, 30%)
bind D \
  split-window -h -p 30 -c "#{pane_current_path}" \;\
  select-pane -L

# Agent layout: editor | agent | logs (3 columns)
bind A \
  split-window -h -p 66 -c "#{pane_current_path}" \;\
  split-window -h -p 50 -c "#{pane_current_path}" \;\
  select-pane -L \;\
  select-pane -L

# Quad layout: editor top-left, tests top-right, agent bottom-left, logs bottom-right
bind Q \
  split-window -h -c "#{pane_current_path}" \;\
  split-window -v -c "#{pane_current_path}" \;\
  select-pane -L \;\
  split-window -v -c "#{pane_current_path}" \;\
  select-pane -L

# ---------------------------------------------------------------------------
# AI AGENTS — mission control for running many agents at once
# (state comes from scripts/agent-hook.sh via Claude Code hooks; see scripts/)
# ---------------------------------------------------------------------------

# Dashboard: fzf popup of every agent window across all sessions, with a live
# pane preview; Enter jumps to it. This is how you find "which agent needs me".
bind a display-popup -E -w 85% -h 75% '~/dotfiles/scripts/agent-dashboard.sh'

# Spawn a new agent in its own git worktree (prompts for a branch name).
bind W command-prompt -p "agent worktree branch:" \
  "display-popup -E -w 90% -h 80% '~/dotfiles/scripts/agent-worktree.sh %1'"

# ---------------------------------------------------------------------------
# CLIPBOARD — WSL2 integration
# ---------------------------------------------------------------------------

# Copy to Windows clipboard via clip.exe
if-shell "grep -qi microsoft /proc/version" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'" \
  "bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel"

# ---------------------------------------------------------------------------
# STATUS BAR — minimal, functional
# ---------------------------------------------------------------------------

set -g status on
set -g status-position top     # status bar at top (preferred for multi-pane)
set -g status-interval 5       # update every 5s (not every second)
set -g status-left-length 40
set -g status-right-length 100

# Colors — dark and readable
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "

# Agent state glyphs per window: ⚡ = waiting on you, ✓ = finished a turn
set -g window-status-format " #I:#W#{?#{==:#{@agent_state},waiting}, ⚡,}#{?#{==:#{@agent_state},done}, ✓,} "
set -g window-status-current-format "#[bg=#3d59a1,fg=#c0caf5,bold] #I:#W#{?#{==:#{@agent_state},waiting}, ⚡,}#{?#{==:#{@agent_state},done}, ✓,} #[default]"

# status-right: agent summary (⚡N waiting / ✓N done across ALL sessions) + git + clock
set -g status-right "#(~/dotfiles/scripts/agent-status-line.sh)#[fg=#565f89]#(cd #{pane_current_path} && git branch --show-current 2>/dev/null || echo '') #{?window_zoomed_flag,#[fg=#e0af68]Z ,}#{?pane_synchronized,#[fg=#f7768e]SYNC ,}#[fg=#565f89]#{?client_prefix,<prefix> ,}#[fg=#7aa2f7]%H:%M "

# Pane border
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status off

# Message styling
set -g message-style "bg=#3d59a1,fg=#c0caf5"

# ---------------------------------------------------------------------------
# PLUGINS — TPM (tmux plugin manager)
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Install plugins: prefix + I
# Update plugins: prefix + U
# ---------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence — survive reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'  # restore Neovim sessions
set -g @continuum-restore 'on'             # auto-restore on start
set -g @continuum-save-interval '5'        # save every 5 minutes

# Better copy/paste
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe'  # don't exit copy mode after yanking

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
