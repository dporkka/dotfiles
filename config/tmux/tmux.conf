# =============================================================================
# tmux.conf — production config for AI-native multi-repo development
# =============================================================================

# ---------------------------------------------------------------------------
# PREFIX — C-a is ergonomic and doesn't conflict with shell readline
# ---------------------------------------------------------------------------

unbind C-b
set -g prefix C-a
bind C-a send-prefix  # C-a C-a sends literal C-a to the shell

# ---------------------------------------------------------------------------
# TERMINAL, COLORS & KITTY PASSTHROUGH (UPDATED FOR KGP)
# ---------------------------------------------------------------------------

set -g default-terminal "tmux-256color"
# CRITICAL: Allow Kitty Graphics Protocol and advanced keyboard escape sequences 
# to bypass the tmux multiplexer engine and render pixel-perfect directly via WezTerm.
set -g allow-passthrough on

# Keep X11/Wayland, SSH agent, and terminal identifier env vars in sync on attachment.
# Added TERM and TERM_PROGRAM so remote tools can accurately detect WezTerm capabilities.
set -g update-environment "DISPLAY WAYLAND_DISPLAY SSH_AUTH_SOCK XAUTHORITY TERM TERM_PROGRAM"

set -g default-shell /bin/bash

# ---------------------------------------------------------------------------
# BEHAVIOR
# ---------------------------------------------------------------------------

set -g mouse on               # mouse support: click pane, scroll, resize
set -g history-limit 100000   # large scrollback for logs/test output
set -g base-index 1           # windows start at 1 (not 0) — easier to reach
setw -g pane-base-index 1     # panes start at 1
set -g renumber-windows on    # renumber windows when one is closed
set -g set-clipboard on       # sync clipboard with OS
set -g focus-events on        # pass focus events to apps (helps Neovim autoread)
set -g automatic-rename off   # don't rename windows automatically
set -g allow-rename off
set -sg escape-time 0         # zero escape delay — CRITICAL for Neovim responsiveness
                               # Without this, <Esc> in Neovim has a 500ms delay.
set -g repeat-time 600        # ms to repeat a bound key without re-pressing prefix

# Bell-based "agent finished" alerts (scripts/notify.sh rings the bell on exit)
set -g monitor-bell on        # flag a window when its process rings the bell
set -g visual-bell off        # no screen flash; just the status-bar flag
set -g bell-action other      # alert on bells from windows other than the focused one
setw -g window-status-bell-style "fg=#1a1b26,bg=#e0af68,bold"

# ---------------------------------------------------------------------------
# VI MODE — consistent with Neovim muscle memory
# ---------------------------------------------------------------------------

setw -g mode-keys vi

# Copy-mode yank: y = copy-selection-and-cancel (overridden by clipboard section
# below with a clipboard-tool pipe). Kept here as internal-buffer fallback.
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel
bind-key -T copy-mode-vi r send-keys -X rectangle-toggle
bind-key -T copy-mode-vi Enter send-keys -X copy-selection-and-cancel
# Ctrl+C in copy mode: copy selection to system clipboard and exit.
bind-key -T copy-mode-vi C-c send-keys -X copy-pipe-and-cancel 'wl-copy'

# Shift+arrow: enter copy mode, begin selection, and move 1 step in that
# direction. Mimics desktop-style keyboard selection inside tmux.
bind -n S-Left  copy-mode \; send-keys -X begin-selection \; send-keys -X cursor-left
bind -n S-Right copy-mode \; send-keys -X begin-selection \; send-keys -X cursor-right
bind -n S-Up    copy-mode \; send-keys -X begin-selection \; send-keys -X cursor-up
bind -n S-Down  copy-mode \; send-keys -X begin-selection \; send-keys -X cursor-down

# ---------------------------------------------------------------------------
# RELOAD
# ---------------------------------------------------------------------------

bind C-r source-file ~/.config/tmux/tmux.conf \; display-message "tmux config reloaded"

# ---------------------------------------------------------------------------
# MODE MENUS
# Enter a mode with C-a <key>, then use the mode-specific bindings below.
# Exit any mode with Esc, q, or Enter.
# ---------------------------------------------------------------------------

bind p switch-client -T pane-mode\; display-message "pane mode: h/j/k/l move, \\|/- split, x close, z zoom, f float, Esc/q exit"
bind t switch-client -T tab-mode\; display-message "tab mode: n new, c rename, x kill, h/l prev/next, 1-9 jump, Esc/q exit"
bind r switch-client -T resize-mode\; display-message "resize mode: h/j/k/l ±5, H/J/K/L ±10, m zoom, Esc/q exit"
bind o switch-client -T session-mode\; display-message "session mode: s switch, n new, f finder, d detach, x kill, Esc/q exit"

# --- Pane mode (C-a p) ---
bind-key -T pane-mode h select-pane -L
bind-key -T pane-mode j select-pane -D
bind-key -T pane-mode k select-pane -U
bind-key -T pane-mode l select-pane -R
bind-key -T pane-mode \| split-window -h -c "#{pane_current_path}"
bind-key -T pane-mode - split-window -v -c "#{pane_current_path}"
bind-key -T pane-mode x kill-pane
bind-key -T pane-mode z resize-pane -Z
bind-key -T pane-mode f display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$SHELL -l"
bind-key -T pane-mode Escape switch-client -T root
bind-key -T pane-mode q switch-client -T root
bind-key -T pane-mode Enter switch-client -T root

# --- Tab/Window mode (C-a t) ---
bind-key -T tab-mode n new-window -c "#{pane_current_path}"
bind-key -T tab-mode c command-prompt -I "#{window_name}" -p "window name:" "rename-window '%%'"
bind-key -T tab-mode x confirm-before kill-window
bind-key -T tab-mode h previous-window
bind-key -T tab-mode l next-window
bind-key -T tab-mode , swap-window -t -1\; select-window -t -1
bind-key -T tab-mode . swap-window -t +1\; select-window -t +1
bind-key -T tab-mode 1 select-window -t 1
bind-key -T tab-mode 2 select-window -t 2
bind-key -T tab-mode 3 select-window -t 3
bind-key -T tab-mode 4 select-window -t 4
bind-key -T tab-mode 5 select-window -t 5
bind-key -T tab-mode 6 select-window -t 6
bind-key -T tab-mode 7 select-window -t 7
bind-key -T tab-mode 8 select-window -t 8
bind-key -T tab-mode 9 select-window -t 9
bind-key -T tab-mode Escape switch-client -T root
bind-key -T tab-mode q switch-client -T root
bind-key -T tab-mode Enter switch-client -T root

# --- Resize mode (C-a r) ---
bind-key -T resize-mode h resize-pane -L 5
bind-key -T resize-mode j resize-pane -D 5
bind-key -T resize-mode k resize-pane -U 5
bind-key -T resize-mode l resize-pane -R 5
bind-key -T resize-mode H resize-pane -L 10
bind-key -T resize-mode J resize-pane -D 10
bind-key -T resize-mode K resize-pane -U 10
bind-key -T resize-mode L resize-pane -R 10
bind-key -T resize-mode m resize-pane -Z
bind-key -T resize-mode Escape switch-client -T root
bind-key -T resize-mode q switch-client -T root
bind-key -T resize-mode Enter switch-client -T root

# --- Session mode (C-a o) ---
bind-key -T session-mode s choose-tree -Zs
bind-key -T session-mode S choose-tree -Zw
bind-key -T session-mode n new-session
bind-key -T session-mode f display-popup -E -w 90% -h 80% '~/dotfiles/scripts/tmux-project-finder.sh'
bind-key -T session-mode d detach-client
bind-key -T session-mode x confirm-before kill-session
bind-key -T session-mode $ command-prompt -I "#{session_name}" -p "session name:" "rename-session '%%'"
bind-key -T session-mode Escape switch-client -T root
bind-key -T session-mode q switch-client -T root
bind-key -T session-mode Enter switch-client -T root

# ---------------------------------------------------------------------------
# PANE SPLITTING — open in current directory
# ---------------------------------------------------------------------------

bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind _ split-window -v -c "#{pane_current_path}" -l 10  # small horizontal split for quick commands
unbind '"'
unbind %

# ---------------------------------------------------------------------------
# PANE NAVIGATION — vim-style + Ctrl variants for speed
# ---------------------------------------------------------------------------

bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# Smart pane switching: if Neovim is running, pass Ctrl+hjkl to it
# Requires the vim-tmux-navigator plugin in Neovim
is_vim="ps -o state= -o comm= -t '#{pane_tty}' | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"

bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h' 'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j' 'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k' 'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l' 'select-pane -R'

bind-key -T copy-mode-vi 'C-h' select-pane -L
bind-key -T copy-mode-vi 'C-j' select-pane -D
bind-key -T copy-mode-vi 'C-k' select-pane -U
bind-key -T copy-mode-vi 'C-l' select-pane -R

# ---------------------------------------------------------------------------
# PANE RESIZING
# ---------------------------------------------------------------------------

bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5
bind -r m resize-pane -Z  # zoom/unzoom pane (maximize)
bind z resize-pane -Z     # standard tmux zoom key

# ---------------------------------------------------------------------------
# WINDOW MANAGEMENT
# ---------------------------------------------------------------------------

bind c new-window -c "#{pane_current_path}"  # new window in current dir
bind C command-prompt -p "window name:" "new-window -c '#{pane_current_path}' -n '%%'"
bind w choose-window                          # window picker
bind , command-prompt -I "#{window_name}" -p "window name:" "rename-window '%%'"
bind b break-pane                             # move current pane into its own window

# Quick window switching without prefix (Alt+number)
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# Move windows left/right
bind -r < swap-window -t -1\; select-window -t -1
bind -r > swap-window -t +1\; select-window -t +1
bind -n M-Left previous-window
bind -n M-Right next-window

# ---------------------------------------------------------------------------
# SESSION MANAGEMENT
# ---------------------------------------------------------------------------

bind s choose-tree -Zs          # session switcher with preview
bind S choose-tree -Zw          # window switcher across sessions
bind n new-session              # new session prompt
bind $ command-prompt -I "#{session_name}" -p "session name:" "rename-session '%%'"
bind X confirm-before kill-session
bind Tab last-window            # quick toggle to previous window

# Mouse shortcuts on the status bar
bind-key -n MouseDown1StatusLeft choose-tree -Zs
bind-key -n MouseDown1StatusRight choose-tree -Zw

# Quick new session from current directory
bind N new-session -c "#{pane_current_path}" -s "#{b:pane_current_path}"
bind f display-popup -E -w 90% -h 80% '~/dotfiles/scripts/tmux-project-finder.sh'

# Fuzzy session/window manager with live preview
bind F display-popup -E -w 90% -h 80% 'selected=$(tmux list-windows -a -F "#S:#I #W" | fzf --prompt="session> " --preview "tmux capture-pane -ep -t {1}" --preview-window=right:60%); [ -n "$selected" ] && tmux switch-client -t "$(echo "$selected" | cut -d" " -f1)"'

# ---------------------------------------------------------------------------
# PRODUCTIVITY POPUPS & MODES
# ---------------------------------------------------------------------------

# Scratch popups (C-t because C-a t is now tab/window mode)
bind C-t display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$SHELL -l"
bind g display-popup -E -w 95% -h 90% -d "#{pane_current_path}" "if command -v lazygit >/dev/null 2>&1; then lazygit; else git status; $SHELL -l; fi"

# Alt pane creation (no prefix)
bind -n 'M-\' split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"
bind -n M-n split-window -c "#{pane_current_path}"
bind -n M-f display-popup -E -w 90% -h 80% -d "#{pane_current_path}" "$SHELL -l"
bind e setw synchronize-panes \; display-message "synchronize-panes: #{?pane_synchronized,on,off}"
bind Space next-layout
bind / copy-mode \; command-prompt -p "search scrollback:" "send-keys -X search-backward '%%'"
bind P command-prompt -I "$HOME/tmux-pane.log" -p "capture file:" "capture-pane -S - \; save-buffer '%%' \; delete-buffer \; display-message 'saved pane to %%'"
bind ? display-popup -E -w 80% -h 80% "tmux list-keys | less"

# ---------------------------------------------------------------------------
# LAYOUTS — for AI agent workflows
# Each layout splits the window and optionally starts useful commands.
# ---------------------------------------------------------------------------

# Dev layout: editor (left, 70%) + lazygit/shell (right, 30%)
bind D \
  split-window -h -p 30 -c "#{pane_current_path}" "if command -v lazygit >/dev/null 2>&1; then lazygit; else $SHELL; fi" \;\
  select-pane -L

# Agent layout: editor | agent shell | logs (3 columns)
bind A \
  split-window -h -p 66 -c "#{pane_current_path}" \;\
  split-window -h -p 50 -c "#{pane_current_path}" "echo 'agent log pane'; $SHELL" \;\
  select-pane -L \;\
  select-pane -L

# Visual Agent Pipeline: Editor (left, 60%) | Dev Logs (top right, 20%) | Carbonyl Browser (bottom right, 20%)
bind V \
  split-window -h -p 40 -c "#{pane_current_path}" \;\
  split-window -v -p 50 -c "#{pane_current_path}" "carbonyl https://localhost:3000 2>/dev/null || echo 'carbonyl not installed; run: cargo install --git https://github.com/fathyb/carbonyl'; $SHELL" \;\
  select-pane -L

# Quad layout: editor top-left, tests top-right, agent bottom-left, logs bottom-right
bind Q \
  split-window -h -c "#{pane_current_path}" "echo 'test/watch pane'; $SHELL" \;\
  split-window -v -c "#{pane_current_path}" "echo 'log pane'; $SHELL" \;\
  select-pane -L \;\
  split-window -v -c "#{pane_current_path}" "echo 'agent pane'; $SHELL" \;\
  select-pane -L

# ---------------------------------------------------------------------------
# AI AGENTS — mission control for running many agents at once
# (state comes from scripts/agent-hook.sh via Claude Code hooks; see scripts/)
# ---------------------------------------------------------------------------

# Dashboard: fzf popup of every agent window across all sessions, with a live
# pane preview; Enter jumps to it. This is how you find "which agent needs me".
bind a display-popup -E -w 85% -h 75% '~/dotfiles/scripts/agent-dashboard.sh'

# Spawn a new agent in its own git worktree (prompts for a branch name).
bind W command-prompt -p "agent worktree branch:" \
  "display-popup -E -w 90% -h 80% '~/dotfiles/scripts/agent-worktree.sh %1'"

# When a tmux session is created (including after a tmux-resurrect restore),
# snapshot state and mark agent sessions as idle until their hooks update them.
set-hook -g session-created "run-shell '~/dotfiles/scripts/tmux-agent-persistence.sh on-session-created #{session_name} >/dev/null 2>&1 || true'"

# When a tmux session dies (e.g. `tmux kill-session`), mark its registry record
# as exited so the unified dashboard doesn't keep showing it until the next prune.
set-hook -g session-closed "run-shell '~/dotfiles/scripts/tmux-agent-persistence.sh on-session-closed #{session_name} >/dev/null 2>&1 || true'"

# Manual registry reconcile after a mass restore (e.g. reboot + continuum).
bind R run-shell '~/dotfiles/scripts/tmux-agent-persistence.sh restore >/dev/null 2>&1 || true'

# Full manual restore: resurrect tmux sessions + reconcile registry + resurrect dead agents
bind C-R run-shell '~/dotfiles/scripts/tmux-service.sh restore >/dev/null 2>&1 || true' \; display-message "full restore triggered"

# Extra AI agent DX shortcuts
# Copy last N lines of scrollback to a temp file for sharing with agents
bind C-c command-prompt -p "copy last N lines:" "capture-pane -S -%% \; save-buffer /tmp/tmux-last-lines.txt \; delete-buffer \; run-shell '~/dotfiles/scripts/notify.sh \"last lines copied to /tmp/tmux-last-lines.txt\"' \; display-message 'copied last lines to /tmp/tmux-last-lines.txt'"

# Send a command to all panes in the current window (multi-agent orchestration)
bind C-s command-prompt -p "send to all panes:" "run-shell '~/dotfiles/scripts/send-to-all-panes.sh \"%1\"'"

# Manually mark the current window as waiting-on-agent (urgent)
bind ! setw -F @agent_state waiting \; display-message "window marked waiting-on-agent"

# Open DiffviewOpen in the editor pane for the current window (agent diff review)
bind v run-shell '~/dotfiles/scripts/agent-diff-review.sh --manual'

# ---------------------------------------------------------------------------
# CLIPBOARD — pipe to system clipboard based on display server
# ---------------------------------------------------------------------------

# Detect clipboard tool at config load. wl-copy (Wayland), xsel/xclip (X11), clip.exe (WSL).
%if-shell "command -v wl-copy >/dev/null 2>&1" \
  "bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'wl-copy'" \
  "%elif-shell \"command -v xsel >/dev/null 2>&1\" \"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xsel -ib'\" \"%elif-shell \\\"command -v xclip >/dev/null 2>&1\\\" \\\"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'xclip -selection clipboard'\\\" \\\"%elif-shell \\\\\\\"grep -qi microsoft /proc/version\\\\\\\" \\\\\\\"bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel 'clip.exe'\\\\\\\" \\\\\\\"bind-key -T copy-mode-vi y send-keys -X copy-selection-and-cancel\\\\\\\"\\\"\\\"\""
%endif
# STATUS BAR — minimal, functional
# ---------------------------------------------------------------------------

set -g status on
set -g status-position top     # status bar at top (preferred for multi-pane)
set -g status-interval 5       # update every 5s (not every second)
set -g status-left-length 40
set -g status-right-length 100

# Colors — dark and readable
set -g status-style "bg=#1a1b26,fg=#a9b1d6"

set -g status-left "#[bg=#7aa2f7,fg=#1a1b26,bold] #S #[default] "

# Agent state glyphs per window: ⚡ = waiting on you, ✓ = finished a turn
set -g window-status-format " #I:#W#{?#{==:#{@agent_state},waiting}, ⚡,}#{?#{==:#{@agent_state},done}, ✓,} "
set -g window-status-current-format "#[bg=#3d59a1,fg=#c0caf5,bold] #I:#W#{?#{==:#{@agent_state},waiting}, ⚡,}#{?#{==:#{@agent_state},done}, ✓,} #[default]"

set -g status-interval 10      # update every 10s (git is cached, so this is fine)
# status-right: agent summary (⚡N waiting / ✓N done across ALL sessions) + git + mode indicators + clock
set -g status-right "#(~/dotfiles/scripts/agent-status-line.sh)#[fg=#565f89]#(~/dotfiles/scripts/tmux-git-branch.sh '#{pane_current_path}') #{?window_zoomed_flag,#[fg=#e0af68]Z ,}#{prefix_highlight}#[fg=#7aa2f7]%H:%M "

# Pane border
set -g pane-border-style "fg=#3b4261"
set -g pane-active-border-style "fg=#7aa2f7"
set -g pane-border-status off

# Message styling
set -g message-style "bg=#3d59a1,fg=#c0caf5"

# ---------------------------------------------------------------------------
# PLUGINS — TPM (tmux plugin manager)
# Install TPM: git clone https://github.com/tmux-plugins/tpm ~/.tmux/plugins/tpm
# Install plugins: prefix + I
# Update plugins: prefix + U
# ---------------------------------------------------------------------------

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'tmux-plugins/tmux-sensible'

# Session persistence — survive reboots
set -g @plugin 'tmux-plugins/tmux-resurrect'
set -g @plugin 'tmux-plugins/tmux-continuum'

set -g @resurrect-capture-pane-contents 'on'
set -g @resurrect-strategy-nvim 'session'  # restore Neovim sessions
set -g @resurrect-save 'M-s'               # prefix + M-s (free up C-s for AI shortcuts)
set -g @resurrect-restore 'M-r'            # prefix + M-r (free up C-r for config reload)
set -g @continuum-restore 'on'             # auto-restore on start
set -g @continuum-save-interval '15'       # save every 15 minutes

# Persist resurrection state under ~/.local/state (user-local, not /tmp).
set -g @resurrect-dir '~/.local/state/tmux/resurrect'

# Restore these programs in addition to tmux-resurrect's defaults.
# Agents are relaunched so they survive a reboot; clear stale registry state
# with `prefix + R` after a mass restore.
set -g @resurrect-processes 'vim nvim emacs man less more tail top htop irssi weechat mutt claude aider'

# Better copy/paste
set -g @plugin 'tmux-plugins/tmux-yank'
set -g @yank_action 'copy-pipe'  # don't exit copy mode after yanking

# Fuzzy finder for sessions/windows/keybindings
set -g @plugin 'sainnhe/tmux-fzf'
set -g @tmux-fzf-launch-key 'C-f'

# Visual prefix indicator in status bar
set -g @plugin 'tmux-plugins/tmux-prefix-highlight'
set -g @prefix_highlight_show_copy_mode 'on'
set -g @prefix_highlight_show_sync_mode 'on'
set -g @prefix_highlight_prefix_prompt 'PREFIX'
set -g @prefix_highlight_copy_prompt 'COPY'
set -g @prefix_highlight_sync_prompt 'SYNC'
set -g @prefix_highlight_fg '#1a1b26'
set -g @prefix_highlight_bg '#e0af68'

# Quick scrollback match/open (URLs, paths, hex colors, etc.)
set -g @plugin 'fcsonline/tmux-thumbs'
set -g @thumbs-key 'C-y'
%if-shell "command -v clip.exe >/dev/null 2>&1"  "set -g @thumbs-command 'echo -n {} | clip.exe'"
%elif-shell "command -v xclip >/dev/null 2>&1"   "set -g @thumbs-command 'echo -n {} | xclip -selection clipboard'"
%elif-shell "command -v wl-copy >/dev/null 2>&1"  "set -g @thumbs-command 'echo -n {} | wl-copy'"
%elif-shell "command -v pbcopy >/dev/null 2>&1"   "set -g @thumbs-command 'echo -n {} | pbcopy'"
%endif

# Initialize TPM (must be last line)
run '~/.tmux/plugins/tpm/tpm'
