# /etc/wsl.conf — lives inside WSL at /etc/wsl.conf
# Controls per-distro WSL behavior. Requires wsl --shutdown to take effect.

[boot]
systemd=true

[automount]
enabled=true
root=/mnt/
options="metadata,umask=22,fmask=11"
# metadata: allows chmod/chown to work on Windows FS (needed for SSH keys on /mnt/c)
# umask/fmask: sane default permissions for automounted Windows files

[network]
hostname=wsl-dev
generateHosts=true
generateResolvConf=true

[interop]
enabled=true
appendWindowsPath=false
# CRITICAL: appendWindowsPath=false
# By default WSL appends your entire Windows PATH into Linux PATH.
# This causes: slow shell startup, command collisions (python.exe found before python3),
# and weird behavior when tools like node.exe get invoked instead of node.
# Keep this false and explicitly add only what you need.

[user]
default=dporkka
